version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: catalogue-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # GPU support (uncomment if using NVIDIA GPU):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # Optional: standalone ChromaDB server (not required — system uses local PersistentClient)
  # chroma:
  #   image: chromadb/chroma:latest
  #   container_name: catalogue-chroma
  #   ports:
  #     - "8000:8000"
  #   volumes:
  #     - chroma_data:/chroma/chroma

volumes:
  ollama_data:
  # chroma_data:
